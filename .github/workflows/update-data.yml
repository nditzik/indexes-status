name: Update data.txt and index.json

on:
  push:
    # Broadened from the canonical name only → any data CSV, so a
    # "nearly-right" export (e.g. watchlist-sandp-500-…) still fires the
    # workflow and gets normalized. Bot pushes (GITHUB_TOKEN) don't
    # re-trigger, so the rename commit can't loop.
    paths:
      - 'data/*.csv'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Rename any non-canonical incoming CSV to the exact name the
      # pipeline expects (watchlist / spx-options-flow / uoa-stocks).
      # Never deletes, never overwrites — see scripts/normalize_incoming.py.
      - name: Normalize incoming filenames
        run: python3 scripts/normalize_incoming.py

      - name: Update data.txt and index.json
        run: |
          python3 -c "
          import json, glob, os, re, shutil
          # Filenames are MM-DD-YYYY which lex-sort wrong across year
          # boundaries. Parse the real date and sort by ISO so 'latest'
          # always means 'most recent trading day', not the alphabetical
          # tail. See README §audit-fix-1.
          DATE_RE = re.compile(r'watchlist-sp-500-intraday-(\d{2})-(\d{2})-(\d{4})\.csv$')
          def iso_key(path):
              m = DATE_RE.search(path)
              if not m: return ''
              mm, dd, yyyy = m.groups()
              return f'{yyyy}-{mm}-{dd}'
          paths = glob.glob('data/watchlist-sp-500-intraday-*.csv')
          paths.sort(key=iso_key)
          if not paths:
              raise SystemExit('no watchlist CSVs found')
          latest = paths[-1]
          print('Latest:', latest)
          shutil.copy(latest, 'data/data.txt')
          files = [os.path.basename(p) for p in paths]
          with open('data/index.json', 'w') as f:
              json.dump(files, f, indent=2)
          print(f'index.json updated: {len(files)} files (ISO-sorted)')
          "

      - name: Update forward snapshots (KNN locked-in for today)
        run: |
          if [ -f scripts/update_forward_snapshots.py ]; then
            python3 scripts/update_forward_snapshots.py
          else
            echo "Snapshot script not found — skipping."
          fi

      # Single source of truth: emit data/daily_state.json (scores, phase,
      # risk-off, verdict, narrative) from the ONE Python computation, so
      # the dashboard and email consume the same state. See phase-3.0.
      - name: Build daily_state.json (single source of truth)
        run: python3 scripts/build_daily_state.py

      # Condense the daily UOA export (if present) into uoa_daily.json for
      # the dashboard Action Zone badges. No-op when no uoa-stocks file.
      - name: Build uoa_daily.json (unusual options activity)
        run: python3 scripts/build_uoa_daily.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -A so any filename normalization (git mv) is committed too,
          # alongside the regenerated data.txt / index / snapshots /
          # daily_state.json.
          git add -A data/
          git diff --staged --quiet || git commit -m "Auto-update data.txt + index.json + forward_snapshots.json (+ normalized filenames)"
          git push

      # Score parity gate — dashboard (JS port) must match the email's
      # Python scoring within ±1. A failure here stops the workflow BEFORE
      # the email goes out, so a formula drift never ships a wrong report.
      - name: Parity check (scores must match between dashboard & email)
        run: python3 tests/parity_test.py

      # NOTE: the daily email is PAUSED (user request, 2026-07).
      # This step still runs send_report.py — it must, because that's what
      # appends data/scores_history.json (the next step depends on it) —
      # but EMAIL_ENABLED=0 makes it skip the Brevo send.
      # ► To resume the daily email: set EMAIL_ENABLED to '1' below.
      # ► To send a one-off now: run the "send-test-email" workflow manually.
      - name: Build report + record scores (email paused)
        env:
          EMAIL_ENABLED: '0'
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          # Subscriber list. Set the EMAIL_SUBSCRIBERS GitHub Secret
          # (JSON array or comma-separated emails) to override the
          # local data/email_subscribers.json fallback.
          # See README §audit-fix-7.
          EMAIL_SUBSCRIBERS: ${{ secrets.EMAIL_SUBSCRIBERS }}
        run: python3 .github/workflows/send_report.py

      # send_report.py appends the day's scores to data/scores_history.json
      # (append-only) on a real send. Then derive the forward-return file
      # (phase 3.4) and commit both. Separate commit because the email is
      # the last step and scores_history is written there.
      - name: Score history + forward tracking (append-only)
        run: |
          python3 scripts/build_score_forward.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores_history.json data/score_forward.json
          git diff --staged --quiet || { git commit -m "scores_history + score_forward: daily update"; git push; }
